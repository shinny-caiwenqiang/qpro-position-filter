<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QPRO 持仓字段筛选</title>
  <style>
    :root { color-scheme: light dark; font-family: "Microsoft YaHei", "Segoe UI", sans-serif; }
    body { margin: 24px; color: CanvasText; background: Canvas; }
    main { max-width: 1440px; margin: auto; }
    h1 { margin: 0; font-size: 20px; }
    .header, .summary, .menu-actions, .filter-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .header { justify-content: space-between; margin-bottom: 14px; }
    .status { font-size: 13px; color: GrayText; }
    .summary { min-height: 28px; margin-bottom: 8px; font-size: 13px; }
    .mode, .chip { border: 1px solid ButtonBorder; border-radius: 999px; padding: 3px 8px; }
    .mode { display: none; }
    .filter-mode .mode { display: inline-block; color: Highlight; border-color: Highlight; }
    .chip button { margin-left: 4px; border: 0; background: transparent; color: inherit; cursor: pointer; }
    .table-wrap { overflow: auto; border: 1px solid ButtonBorder; min-height: 380px; }
    table { min-width: 1120px; width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 0; border-bottom: 1px solid ButtonBorder; text-align: right; white-space: nowrap; }
    th { position: sticky; top: 0; z-index: 1; background: Canvas; font-weight: 500; }
    .header-button { width: 100%; min-height: 34px; display: flex; align-items: center; justify-content: flex-end; gap: 5px; padding: 0 7px; }
    th.left .header-button { justify-content: flex-start; }
    .sort-button { min-height: 28px; padding: 0; border: 0; color: inherit; background: transparent; font: inherit; cursor: pointer; }
    td { padding: 8px; }
    td.left { text-align: left; }
    .filter-icon { display: none; width: 18px; height: 18px; padding: 2px; border: 1px solid ButtonBorder; border-radius: 3px; color: GrayText; background: Canvas; cursor: pointer; }
    .filter-mode .filter-icon { display: inline-flex; align-items: center; justify-content: center; }
    .filter-icon.active { color: HighlightText; background: Highlight; border-color: Highlight; }
    .filter-icon svg { width: 12px; height: 12px; fill: currentColor; }
    .negative { color: #c62828; }
    .empty { padding: 26px; text-align: center; color: GrayText; }
    .context-menu, .filter-popover { display: none; position: fixed; z-index: 20; border: 1px solid ButtonBorder; background: Canvas; box-shadow: 0 4px 18px rgba(0,0,0,.22); }
    .context-menu.open, .filter-popover.open { display: block; }
    .context-menu button { display: block; width: 180px; padding: 8px 12px; border: 0; background: transparent; color: inherit; text-align: left; cursor: pointer; }
    .context-menu button:hover { background: Highlight; color: HighlightText; }
    .context-menu .checked::before { content: "✓ "; }
    .filter-popover { width: min(350px, calc(100vw - 24px)); }
    .popover-title { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid ButtonBorder; }
    .sort-actions, .filter-actions { padding: 8px 10px; border-bottom: 1px solid ButtonBorder; }
    .sort-actions button, .filter-actions button { min-height: 28px; }
    .enum-options { max-height: 220px; overflow: auto; padding: 6px 10px; }
    .enum-options label { display: flex; gap: 7px; align-items: center; min-height: 28px; }
    .number-options { display: grid; grid-template-columns: 74px 1fr; gap: 8px; align-items: center; padding: 10px; }
    .number-options select, .number-options input { min-height: 28px; font: inherit; }
    .filter-actions { justify-content: flex-end; }
    pre { overflow: auto; padding: 10px; border: 1px solid ButtonBorder; font-size: 12px; }
    @media (max-width: 640px) { body { margin: 12px; } }
  </style>
</head>
<body>
  <main id="app">
    <div class="header">
      <h1>持仓列表</h1>
      <span id="status" class="status">正在连接本地 QPRO API…</span>
    </div>
    <div id="summary" class="summary">
      <span id="mode" class="mode">字段筛选模式</span>
      <span id="row-count"></span>
      <span id="chips"></span>
    </div>
    <div id="table-wrap" class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>
    <details>
      <summary>当前 API 查询</summary>
      <pre id="sql-preview"></pre>
    </details>
  </main>

  <div id="context-menu" class="context-menu">
    <button id="toggle-mode" type="button">字段筛选</button>
    <button id="clear-all" type="button">清空全部筛选</button>
  </div>
  <div id="filter-popover" class="filter-popover"></div>

  <script>
    const columns = [
      { key: "user_desc", name: "账户", kind: "enum", left: true },
      { key: "exchange_id", name: "交易所", kind: "enum", left: true },
      { key: "instrument_id", name: "合约代码", kind: "enum", left: true },
      { key: "product_id", name: "品种", kind: "enum", left: true },
      { key: "direction", name: "买卖", kind: "enum", left: true },
      { key: "hedge_type", name: "投保", kind: "enum", left: true },
      { key: "volume", name: "总仓", kind: "number" },
      { key: "last_price", name: "最新价", kind: "number" },
      { key: "position_price", name: "持仓均价", kind: "number" },
      { key: "position_profit", name: "持仓盈亏", kind: "number" },
      { key: "float_profit", name: "浮动盈亏", kind: "number" },
      { key: "margin", name: "占用保证金", kind: "number" },
      { key: "update_time", name: "更新时间", kind: "text", left: true }
    ];
    const state = {
      rows: [], filterMode: false, filters: new Map(), sort: { key: "", ascending: true }
    };
    const $ = (selector) => document.querySelector(selector);
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, char => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[char]);
    const formatNumber = (value) => Number.isFinite(Number(value))
      ? new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 2 }).format(Number(value)) : "—";
    const columnByKey = (key) => columns.find(column => column.key === key);
    const displayValue = (key, value) => {
      if (key === "direction") return value === "BUY" ? "买" : "卖";
      if (key === "hedge_type") return value === "SPECULATION" ? "投机" : "其他";
      return value || "—";
    };
    const icon = () => '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M1 2h14L10 8v5l-4 1V8z"/></svg>';

    function apiSql() {
      return [
        "WITH position_rows AS (",
        "  SELECT user_key, user_desc, exchange_id, instrument_id, product_id, last_price, update_time,",
        "         'BUY' AS direction, 'SPECULATION' AS hedge_type,",
        "         COALESCE(long_spec_volume_today, 0) + COALESCE(long_spec_volume_his, 0) AS volume,",
        "         long_spec_position_price AS position_price, long_spec_position_profit AS position_profit,",
        "         long_spec_float_profit AS float_profit, long_spec_margin AS margin FROM PositionSnap",
        "  UNION ALL",
        "  SELECT user_key, user_desc, exchange_id, instrument_id, product_id, last_price, update_time,",
        "         'BUY', 'OTHER', COALESCE(long_other_volume_today, 0) + COALESCE(long_other_volume_his, 0),",
        "         long_other_position_price, long_other_position_profit, long_other_float_profit, long_other_margin FROM PositionSnap",
        "  UNION ALL",
        "  SELECT user_key, user_desc, exchange_id, instrument_id, product_id, last_price, update_time,",
        "         'SELL', 'SPECULATION', COALESCE(short_spec_volume_today, 0) + COALESCE(short_spec_volume_his, 0),",
        "         short_spec_position_price, short_spec_position_profit, short_spec_float_profit, short_spec_margin FROM PositionSnap",
        "  UNION ALL",
        "  SELECT user_key, user_desc, exchange_id, instrument_id, product_id, last_price, update_time,",
        "         'SELL', 'OTHER', COALESCE(short_other_volume_today, 0) + COALESCE(short_other_volume_his, 0),",
        "         short_other_position_price, short_other_position_profit, short_other_float_profit, short_other_margin FROM PositionSnap",
        ")",
        "SELECT user_key, user_desc, exchange_id, instrument_id, product_id, direction, hedge_type, volume,",
        "       last_price, position_price, position_profit, float_profit, margin, update_time",
        "FROM position_rows WHERE volume > 0 ORDER BY exchange_id, instrument_id LIMIT 1000"
      ].join("\n");
    }

    // GitHub Pages 上运行时，页面连接用户本机的 Companion；本地直接打开时仍使用同源路径。
    const localApiOrigin = new URLSearchParams(location.search).get("api")
      || (location.hostname === "127.0.0.1" || location.hostname === "localhost" ? "" : "http://127.0.0.1:8812");
    const apiUrl = (path) => localApiOrigin + path;

    async function fetchRows() {
      const sql = apiSql();
      $("#sql-preview").textContent = sql;
      const response = await fetch(apiUrl("/api/query"), {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ sql })
      });
      const result = await response.json();
      if (!response.ok || !result.ok) throw new Error(result.error?.message || "查询失败");
      state.rows = result.rows.map(values => Object.fromEntries(result.columns.map((column, index) => [column, values[index]])));
      $("#status").textContent = "本地 API 已连接 · " + result.elapsed_ms + "ms";
    }

    function valueMatches(row, filter) {
      const value = row[filter.key];
      if (filter.type === "enum") return filter.values.has(String(value || ""));
      const number = Number(value);
      if (!Number.isFinite(number)) return false;
      if (filter.operator === "=") return number === filter.from;
      if (filter.operator === ">") return number > filter.from;
      if (filter.operator === ">=") return number >= filter.from;
      if (filter.operator === "<") return number < filter.from;
      if (filter.operator === "<=") return number <= filter.from;
      return number >= filter.from && number <= filter.to;
    }

    function visibleRows() {
      const rows = state.rows.filter(row => Array.from(state.filters.values()).every(filter => valueMatches(row, filter)));
      if (!state.sort.key) return rows;
      const { key, ascending } = state.sort;
      return rows.sort((a, b) => {
        const left = a[key] ?? ""; const right = b[key] ?? "";
        const result = columnByKey(key).kind === "number" ? Number(left) - Number(right) : String(left).localeCompare(String(right));
        return ascending ? result : -result;
      });
    }

    function headerHtml(column) {
      const filtered = state.filters.has(column.key);
      const sorted = state.sort.key === column.key ? (state.sort.ascending ? " ↑" : " ↓") : "";
      return '<th class="' + (column.left ? "left" : "") + '"><div class="header-button"><button class="sort-button" data-sort="' + column.key + '">' +
        escapeHtml(column.name + sorted) + '</button><span></span>' +
        (column.kind !== "text" ? '<button class="filter-icon ' + (filtered ? "active" : "") + '" data-filter="' + column.key + '" aria-label="' + escapeHtml(column.name + "筛选") + '">' + icon() + '</button>' : "") +
        '</div></th>';
    }

    function draw() {
      const rows = visibleRows();
      $("#app").classList.toggle("filter-mode", state.filterMode);
      $("#mode").hidden = !state.filterMode;
      $("#table-head").innerHTML = '<tr>' + columns.map(headerHtml).join("") + '</tr>';
      $("#result-body").innerHTML = rows.length ? rows.map(row => '<tr>' + columns.map(column => {
        const raw = row[column.key];
        const formatted = column.kind === "number" ? formatNumber(raw) : displayValue(column.key, raw);
        const className = (column.left ? "left " : "") + (column.kind === "number" && Number(raw) < 0 ? "negative" : "");
        return '<td class="' + className + '">' + escapeHtml(formatted) + '</td>';
      }).join("") + '</tr>').join("") : '<tr><td class="empty" colspan="' + columns.length + '">没有符合条件的持仓</td></tr>';
      $("#row-count").textContent = "当前 " + rows.length + " 条";
      $("#chips").innerHTML = Array.from(state.filters.values()).map(filter => {
        const column = columnByKey(filter.key);
        const text = filter.type === "enum"
          ? column.name + "：" + Array.from(filter.values).map(value => displayValue(filter.key, value)).join("、")
          : column.name + " " + filter.operator + " " + filter.from + (filter.operator === "between" ? " 至 " + filter.to : "");
        return '<span class="chip">' + escapeHtml(text) + '<button data-clear="' + filter.key + '" aria-label="清空">×</button></span>';
      }).join("");
    }

    function optionsFor(key) {
      return [...new Set(state.rows.map(row => String(row[key] || "")).filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function closeMenus() {
      $("#context-menu").classList.remove("open");
      $("#filter-popover").classList.remove("open");
    }

    function openContext(event) {
      event.preventDefault();
      closeMenus();
      $("#toggle-mode").classList.toggle("checked", state.filterMode);
      $("#clear-all").hidden = state.filters.size === 0;
      const menu = $("#context-menu");
      menu.style.left = event.clientX + "px";
      menu.style.top = event.clientY + "px";
      menu.classList.add("open");
    }

    function openFilter(key, target) {
      const column = columnByKey(key);
      const filter = state.filters.get(key);
      const popover = $("#filter-popover");
      const sort = '<div class="sort-actions"><button data-sort-action="asc">升序排列</button><button data-sort-action="desc">降序排列</button></div>';
      let body = "";
      if (column.kind === "enum") {
        const selected = filter?.values || new Set();
        body = '<div class="enum-options">' + optionsFor(key).map(value => '<label><input type="checkbox" value="' + escapeHtml(value) + '" ' + (selected.has(value) ? "checked" : "") + '>' + escapeHtml(displayValue(key, value)) + '</label>').join("") + '</div>';
      } else {
        const operator = filter?.operator || "=";
        const from = filter?.from ?? "";
        const to = filter?.to ?? "";
        body = '<div class="number-options"><label>条件</label><select id="number-operator">' +
          ["=", ">", ">=", "<", "<=", "between"].map(value => '<option value="' + value + '" ' + (value === operator ? "selected" : "") + '>' + ({ "=": "等于", ">": "大于", ">=": "大于等于", "<": "小于", "<=": "小于等于", between: "区间" })[value] + '</option>').join("") +
          '</select><label>数值</label><input id="number-from" type="number" step="any" value="' + from + '"><label id="to-label">上限</label><input id="number-to" type="number" step="any" value="' + to + '"></div>';
      }
      popover.innerHTML = '<div class="popover-title"><strong>' + escapeHtml(column.name + "筛选") + '</strong><span>' + (column.kind === "enum" ? "枚举字段" : "数值字段") + '</span></div>' + sort + body +
        '<div class="filter-actions"><button data-action="clear">清空</button><button data-action="cancel">取消</button><button data-action="apply">确定</button></div>';
      popover.dataset.key = key;
      const rect = target.getBoundingClientRect();
      popover.style.left = Math.min(rect.left, window.innerWidth - 360) + "px";
      popover.style.top = Math.min(rect.bottom + 4, window.innerHeight - 360) + "px";
      popover.classList.add("open");
      updateRangeFields();
    }

    function updateRangeFields() {
      const range = $("#number-operator")?.value === "between";
      if ($("#number-to")) { $("#number-to").hidden = !range; $("#to-label").hidden = !range; }
    }

    function applyPopover(action) {
      const popover = $("#filter-popover");
      const key = popover.dataset.key;
      if (action === "cancel") return closeMenus();
      if (action === "clear") { state.filters.delete(key); closeMenus(); draw(); return; }
      const column = columnByKey(key);
      if (column.kind === "enum") {
        const values = new Set(Array.from(popover.querySelectorAll("input:checked"), input => input.value));
        if (values.size) state.filters.set(key, { key, type: "enum", values }); else state.filters.delete(key);
      } else {
        const operator = $("#number-operator").value;
        const from = Number($("#number-from").value);
        const to = Number($("#number-to").value);
        if (!Number.isFinite(from) || (operator === "between" && (!Number.isFinite(to) || from > to))) return;
        state.filters.set(key, { key, type: "number", operator, from, to });
      }
      closeMenus();
      draw();
    }

    $("#table-wrap").addEventListener("contextmenu", openContext);
    $("#table-head").addEventListener("click", event => {
      const filterButton = event.target.closest("[data-filter]");
      if (filterButton && state.filterMode) { event.stopPropagation(); openFilter(filterButton.dataset.filter, filterButton); return; }
      const sortButton = event.target.closest("[data-sort]");
      if (sortButton && !state.filterMode) {
        const key = sortButton.dataset.sort;
        state.sort = { key, ascending: state.sort.key === key ? !state.sort.ascending : true };
        draw();
      }
    });
    $("#context-menu").addEventListener("click", event => {
      if (event.target.id === "toggle-mode") { state.filterMode = !state.filterMode; closeMenus(); draw(); }
      if (event.target.id === "clear-all") { state.filters.clear(); closeMenus(); draw(); }
    });
    $("#filter-popover").addEventListener("click", event => {
      const action = event.target.dataset.action;
      const sortAction = event.target.dataset.sortAction;
      if (action) applyPopover(action);
      if (sortAction) {
        state.sort = { key: $("#filter-popover").dataset.key, ascending: sortAction === "asc" };
        draw();
      }
    });
    $("#filter-popover").addEventListener("change", event => { if (event.target.id === "number-operator") updateRangeFields(); });
    $("#chips").addEventListener("click", event => {
      const key = event.target.dataset.clear;
      if (key) { state.filters.delete(key); draw(); }
    });
    document.addEventListener("click", event => {
      if (!event.target.closest("#context-menu") && !event.target.closest("#filter-popover") && !event.target.closest(".filter-icon")) closeMenus();
    });

    fetch(apiUrl("/api/health")).then(response => response.json()).then(result => {
      if (!result.ok) throw new Error("服务不可用");
      return fetchRows();
    }).then(draw).catch(error => {
      $("#status").textContent = "本地 API 不可用：" + error.message;
      $("#result-body").innerHTML = '<tr><td class="empty" colspan="13">' + escapeHtml(error.message) + '</td></tr>';
    });
  </script>
</body>
</html>
